name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Compile contracts
        run: npx hardhat compile 2>&1 | tee compile-output.txt

      - name: Lint Solidity
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with gas report
        run: npx hardhat test --gas-stats-json gas-report.json 2>&1 | tee test-output.txt

      - name: Generate CI report
        run: node scripts/ci-report.mjs

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: |
            ci-report.md
            gas-report.json
            test-output.txt
            compile-output.txt

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          path: ci-report.md

  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run coverage
        run: npm run coverage

      - name: Setup LCOV
        if: github.event_name == 'pull_request'
        uses: hrishikesh-kadam/setup-lcov@v1

      - name: Report coverage
        if: github.event_name == 'pull_request'
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 100
          artifact-name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
